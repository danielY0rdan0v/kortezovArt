spring.application.name=kortezovArt
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_NAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=50MB

# Cloudinary Settings
# Папка на твоя компютър (за тестове локално)
# Spring Boot автоматично ще я създаде, ако я няма
file.upload-dir=./uploads

# Настройка Spring да знае, че когато някой напише в браузъра /uploads/снимка.jpg,
# трябва да я вземе от тази папка
spring.web.resources.static-locations=file:./uploads/,classpath:/static/


