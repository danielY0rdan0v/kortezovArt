<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefan Kortezov | Studio Admin</title>
    <link rel="icon" type="image/png" href="/images/faviconV3.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-page">

<header class="premium-header solid-header">
    <div class="logo-container">
        <a href="/" class="logo-cursive">Stefan Kortezov</a>
        <span class="logo-sub">STUDIO ADMIN</span>
    </div>
    <nav class="premium-nav">
        <ul class="nav-links">
            <li><a href="/home">HOME</a></li>
            <li><a href="/products">SCULPTURES</a></li>
        </ul>
    </nav>
</header>

<main class="admin-wrapper">
    <div class="admin-grid">

        <section class="admin-card-container">
            <h2 class="admin-section-title" id="form-title">Forge New Masterpiece</h2>
            <div class="premium-admin-card">
                <div class="input-group">
                    <label>Sculpture Title</label>
                    <input type="text" id="title" placeholder="e.g. The Bronze Lioness">
                </div>

                <div class="input-group">
                    <label>Price (EURO)</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>

                <div class="input-group">
                    <label>Dimensions (Length x Width x Height in cm)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="dim-l" placeholder="Length" style="width: 33%;">
                        <input type="number" id="dim-w" placeholder="Width" style="width: 33%;">
                        <input type="number" id="dim-h" placeholder="Height" style="width: 33%;">
                    </div>
                </div>

                <div class="input-group">
                    <label>The Story (Description)</label>
                    <textarea id="description" rows="6" placeholder="Describe the inspiration behind this piece..."></textarea>
                </div>

                <div class="file-upload-section">
                    <div class="upload-box">
                        <label><i class="fa-solid fa-image"></i> Main Showcase Image</label>
                        <input type="file" id="image" accept="image/*" onchange="previewMain(this)">
                        <div id="main-preview" class="image-preview-area"></div>
                    </div>

                    <div class="upload-box">
                        <label><i class="fa-solid fa-images"></i> Additional Gallery Views</label>
                        <input type="file" id="galleryFiles" multiple accept="image/*" onchange="previewGallery(this)">
                        <div id="gallery-preview" class="image-preview-area gallery-previews"></div>
                    </div>
                </div>

                <div class="admin-actions">
                    <button id="submit-btn" class="btn-copper-solid" onclick="submitForm()">UPLOAD TO GALLERY</button>
                    <button id="cancel-btn" class="btn-cancel" style="display: none;" onclick="cancelEdit()">CANCEL EDIT</button>
                </div>
            </div>
        </section>

        <section class="admin-list-container">
            <h2 class="admin-section-title">Current Collection</h2>
            <div id="admin-product-list" class="premium-list-card">
                <p class="loading-msg">Loading masterpieces...</p>
            </div>
        </section>
    </div>
</main>

<div id="loading-overlay">
    <div class="copper-spinner"></div>
    <p>Forging in progress...</p>
</div>

<div id="toast-notification"></div>

<script>
    let allProducts = [];
    let editingId = null;
    let keptGalleryImages = [];

    function getCsrfToken() {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; XSRF-TOKEN=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    async function loadAdminList() {
        const res = await fetch('/api/products');
        allProducts = await res.json();
        const list = document.getElementById('admin-product-list');

        if(allProducts.length === 0) {
            list.innerHTML = "<p class='empty-msg'>No masterpieces added yet.</p>";
            return;
        }

        list.innerHTML = allProducts.map(p => `
                <div class="list-item">
                    <div class="item-img"><img src="${p.mainImage || 'https://via.placeholder.com/50'}" alt=""></div>
                    <div class="item-details">
                        <strong>${p.title}</strong>
                        <span>${(p.price || 0).toFixed(2)} EURO</span>
                    </div>
                    <div class="item-btns">
                        <button class="edit-btn" onclick="startEdit(${p.id})"><i class="fa-solid fa-pen"></i></button>
                        <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
    }

    function startEdit(id) {
        const p = allProducts.find(item => item.id === id);
        if(!p) return;
        editingId = id;

        document.getElementById('title').value = p.title;
        document.getElementById('price').value = p.price;
        document.getElementById('description').value = p.description;

        // РАЗДЕЛЯМЕ РАЗМЕРИТЕ В 3-ТЕ ПОЛЕТА
        if(p.dimensions) {
            const parts = p.dimensions.split('x');
            document.getElementById('dim-l').value = parts[0] || "";
            document.getElementById('dim-w').value = parts[1] || "";
            document.getElementById('dim-h').value = parts[2] || "";
        } else {
            document.getElementById('dim-l').value = "";
            document.getElementById('dim-w').value = "";
            document.getElementById('dim-h').value = "";
        }

        keptGalleryImages = p.gallery ? [...p.gallery] : [];

        renderPreviews(p.mainImage);

        document.getElementById('form-title').innerText = "Refine Masterpiece";
        document.getElementById('submit-btn').innerText = "SAVE CHANGES";
        document.getElementById('cancel-btn').style.display = "inline-block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPreviews(mainImg) {
        document.getElementById('main-preview').innerHTML = mainImg ? `<div class="p-box"><img src="${mainImg}"></div>` : '';
        document.getElementById('gallery-preview').innerHTML = keptGalleryImages.map((img, i) => `
                <div class="p-box">
                    <img src="${img}">
                    <button class="rm-btn" onclick="removeKept(${i})">&times;</button>
                </div>
            `).join('');
    }

    function removeKept(i) {
        keptGalleryImages.splice(i, 1);
        renderPreviews(null);
    }

    function previewMain(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('main-preview').innerHTML = `<div class="p-box"><img src="${e.target.result}"></div>`;
            reader.readAsDataURL(input.files[0]);
        }
    }

    function previewGallery(input) {
        const container = document.getElementById('gallery-preview');
        if (input.files) {
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => container.innerHTML += `<div class="p-box"><img src="${e.target.result}" style="border-color: var(--copper)"></div>`;
                reader.readAsDataURL(file);
            });
        }
    }

    function cancelEdit() {
        editingId = null;
        keptGalleryImages = [];
        document.getElementById('title').value = "";
        document.getElementById('price').value = "";
        document.getElementById('description').value = "";

        // ИЗЧИСТВАМЕ 3-ТЕ ПОЛЕТА
        document.getElementById('dim-l').value = "";
        document.getElementById('dim-w').value = "";
        document.getElementById('dim-h').value = "";

        document.getElementById('image').value = "";
        document.getElementById('galleryFiles').value = "";
        document.getElementById('main-preview').innerHTML = "";
        document.getElementById('gallery-preview').innerHTML = "";
        document.getElementById('form-title').innerText = "Forge New Masterpiece";
        document.getElementById('submit-btn').innerText = "UPLOAD TO GALLERY";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function showToast(msg, type) {
        const toast = document.getElementById("toast-notification");
        toast.innerText = msg;
        toast.className = "show " + type;
        setTimeout(() => toast.className = "", 3000);
    }

    async function submitForm() {
        const title = document.getElementById('title').value.trim();
        const price = document.getElementById('price').value;

        // ВЗИМАМЕ СТОЙНОСТИТЕ
        const l = document.getElementById('dim-l').value;
        const w = document.getElementById('dim-w').value;
        const h = document.getElementById('dim-h').value;

        if(!title || !price) { showToast("Title and Price are required!", "error"); return; }

        const formData = new FormData();
        formData.append('title', title);
        formData.append('price', price);
        formData.append('description', document.getElementById('description').value);

        // СЛЕПВАМЕ И ИЗПРАЩАМЕ
        if(l || w || h) {
            const dimensionsCombined = `${l || 0}x${w || 0}x${h || 0}`;
            formData.append('dimensions', dimensionsCombined);
        }

        const mainImg = document.getElementById('image').files[0];
        if(mainImg) formData.append('image', mainImg);

        const gallery = document.getElementById('galleryFiles').files;
        for(let i=0; i<gallery.length; i++) formData.append('galleryFiles', gallery[i]);

        if(editingId) keptGalleryImages.forEach(img => formData.append('existingGallery', img));

        document.getElementById('loading-overlay').style.display = 'flex';

        try {
            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? '/api/products/' + editingId : '/api/products';

            const res = await fetch(url, {
                method: method,
                headers: {
                    'X-XSRF-TOKEN': getCsrfToken()
                },
                body: formData
            });

            document.getElementById('loading-overlay').style.display = 'none';
            if(res.ok) {
                showToast(editingId ? 'Refined successfully!' : 'Forged successfully!', 'success');
                cancelEdit();
                loadAdminList();
            } else { showToast('Upload failed!', 'error'); }
        } catch (e) {
            document.getElementById('loading-overlay').style.display = 'none';
            showToast('Server error!', 'error');
        }
    }

    async function deleteProduct(id) {
        if(confirm('Are you sure you want to remove this masterpiece?')) {
            const res = await fetch('/api/products/' + id, {
                method: 'DELETE',
                headers: {
                    'X-XSRF-TOKEN': getCsrfToken()
                }
            });
            if(res.ok) { showToast('Removed!', 'success'); loadAdminList(); }
        }
    }

    loadAdminList();
</script>
</body>
</html>
