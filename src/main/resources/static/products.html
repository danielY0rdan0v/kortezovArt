<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kortezov Art | Всички фигури</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <a href="/" class="logo">Kortezov Art</a>

    <div class="hamburger" onclick="toggleMenu()">
        &#9776;
    </div>

    <ul class="nav-links" id="nav-menu">
        <li><a href="/">Начало</a></li>
        <li><a href="/products">Продукти</a></li>
    </ul>
</nav>

<main class="gallery-section">
    <h2>Всички метални фигури</h2>

    <div id="products-container" class="products-grid">
        <p>Зареждане на продуктите...</p>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetchProducts();
    });

    function fetchProducts() {
        fetch('/api/products')
            .then(response => response.json())
            .then(products => {
                const container = document.getElementById('products-container');
                container.innerHTML = '';

                products.forEach(product => {
                    const imageUrl = product.mainImage ? product.mainImage : 'https://via.placeholder.com/300x300?text=Няма+снимка';

                    const productCard = `
                            <div class="product-card" onclick="window.location.href='/product-details?id=${product.id}'">
                                <img src="${imageUrl}" alt="${product.title}">
                                <h3>${product.title}</h3>
                                <p class="price">${(product.price || 0).toFixed(2)} лв.</p>
                            </div>
                        `;
                    container.innerHTML += productCard;
                });
            })
            .catch(error => {
                console.error('Грешка при зареждане:', error);
                document.getElementById('products-container').innerHTML = '<p>Грешка при зареждане на галерията.</p>';
            });
    }

    function toggleMenu() {
        const menu = document.getElementById('nav-menu');
        menu.classList.toggle('active');
    }
</script>
</body>
</html>
