<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefan Kortezov | Masterpiece Details</title>
    <link rel="icon" type="image/png" href="/images/faviconV3.png">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-page">

<header class="premium-header solid-header">
    <div class="logo-container">
        <a href="/" class="logo-cursive">Stefan Kortezov</a>
        <span class="logo-sub">COPPER SCULPTURES</span>
    </div>

    <nav class="premium-nav">
        <div class="hamburger" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <ul class="nav-links" id="nav-menu">
            <li><a href="/home">HOME</a></li>
            <li><a href="/products">SCULPTURES</a></li>
            <li><a href="/about">ABOUT ME</a></li>
            <li><a href="/contact">CONTACT</a></li>
        </ul>
    </nav>
</header>

<main class="details-wrapper">
    <div class="back-link-container">
        <a href="/products" class="back-to-collection"><i class="fa-solid fa-arrow-left-long"></i> Back to Collection</a>
    </div>

    <div id="product-content" class="details-grid">
        <p style="color: var(--text-gray); text-align: center; grid-column: 1/-1;">Loading masterpiece details...</p>
    </div>
</main>

<div id="image-modal" class="premium-modal" onclick="closeModal()">
    <span class="close-btn">&times;</span>
    <img class="modal-content" id="zoomed-image">
</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById('nav-menu');
        menu.classList.toggle('active');
    }

    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            document.getElementById('product-content').innerHTML = "<h2 style='color: var(--copper); text-align: center; width: 100%;'>Sculpture not found.</h2>";
            return;
        }

        fetch('/api/products/' + productId)
            .then(response => {
                if (!response.ok) throw new Error("Error");
                return response.json();
            })
            .then(product => {
                const mainImageUrl = product.mainImage ? product.mainImage : 'https://via.placeholder.com/600x800/111111/c08457?text=No+Image';

                let galleryHtml = '';
                if (product.gallery && product.gallery.length > 0) {
                    product.gallery.forEach(imgUrl => {
                        galleryHtml += `<img src="${imgUrl}" class="premium-thumb" onclick="changeMainImage('${imgUrl}')" alt="Gallery">`;
                    });
                }

                // ДОБАВЕНО: Логика за показване на размерите
                // Логика за 3-те кутийки с размери
                let dimensionsHtml = '';
                if (product.dimensions && product.dimensions.trim() !== '') {
                    // Разрязваме текста "50x30x20" на три отделни променливи
                    const parts = product.dimensions.split('x');
                    const length = parts[0] || "-";
                    const width = parts[1] || "-";
                    const height = parts[2] || "-";

                    dimensionsHtml = `
                        <h4 style="color: var(--copper); margin-top: 20px; font-size: 0.9rem; text-transform: uppercase;">Dimensions</h4>
                        <div class="specs-grid">
                            <div class="spec-box">
                                <i class="fa-solid fa-arrows-left-right"></i>
                                <span class="spec-label">Length</span>
                                <span class="spec-value">${length} cm</span>
                            </div>
                            <div class="spec-box">
                                <i class="fa-solid fa-cube"></i>
                                <span class="spec-label">Width</span>
                                <span class="spec-value">${width} cm</span>
                            </div>
                            <div class="spec-box">
                                <i class="fa-solid fa-arrows-up-down"></i>
                                <span class="spec-label">Height</span>
                                <span class="spec-value">${height} cm</span>
                            </div>
                        </div>
                    `;
                }

                const detailsHtml = `
                        <div class="details-images">
                            <div class="main-image-container">
                                <img src="${mainImageUrl}" id="main-image" class="details-main-img zoom-trigger" onclick="openModal()" alt="${product.title}">
                            </div>
                            <div class="details-thumbnails">
                                <img src="${mainImageUrl}" class="premium-thumb active-p-thumb" onclick="changeMainImage('${mainImageUrl}')" alt="Main">
                                ${galleryHtml}
                            </div>
                        </div>
                        <div class="details-info">
                            <span class="category-tag">Unique Sculpture</span>
                            <h1 class="details-title">${product.title}</h1>
                            <p class="details-price">${(product.price || 0).toFixed(2)} EURO</p>

                            ${dimensionsHtml}

                            <div class="details-divider"></div>

                            <div class="description-box">
                                <h3>The Story</h3>
                                <p>${product.description}</p>
                            </div>
                        </div>
                    `;

                document.getElementById('product-content').innerHTML = detailsHtml;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('product-content').innerHTML = "<h2 style='color: var(--copper); text-align: center; width: 100%;'>Error loading details.</h2>";
            });
    });

    function changeMainImage(newSrc) {
        document.getElementById('main-image').src = newSrc;
    }

    function openModal() {
        const modal = document.getElementById('image-modal');
        const zoomedImg = document.getElementById('zoomed-image');
        const currentMainImg = document.getElementById('main-image').src;
        modal.style.display = "flex";
        zoomedImg.src = currentMainImg;
    }

    function closeModal() {
        document.getElementById('image-modal').style.display = "none";
    }
</script>
</body>
</html>
